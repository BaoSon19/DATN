<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý khách hàng</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>

<div class="container mt-4">

    <h2 class="text-center mb-4">QUẢN LÝ KHÁCH HÀNG</h2>

    <!-- FORM -->
    <form th:object="${khachHang}" method="post" class="border p-3 rounded shadow-sm">

        <input type="hidden" th:field="*{idKh}">

        <div class="row">

            <div class="col-md-6 mb-3">
                <label>Mã khách hàng</label>
                <input type="text" class="form-control" th:field="*{maKh}">
            </div>

            <div class="col-md-6 mb-3">
                <label>Tên khách hàng</label>
                <input type="text" class="form-control" th:field="*{tenKhachHang}">
            </div>

            <div class="col-md-6 mb-3">
                <label>Tên tài khoản</label>
                <input type="text" class="form-control" th:field="*{tenTaiKhoan}">
            </div>

            <div class="col-md-6 mb-3">
                <label>Số điện thoại</label>
                <input type="text" class="form-control" th:field="*{soDienThoai}">
            </div>

            <div class="col-md-6 mb-3">
                <label>Email</label>
                <input type="email" class="form-control" th:field="*{email}">
            </div>

            <div class="col-md-6 mb-3">
                <label>Địa chỉ</label>
                <input type="text" class="form-control" th:field="*{diaChi}">
            </div>

            <div class="col-md-6 mb-3">
                <label>Giới tính</label>
                <select class="form-select" th:field="*{gioiTinh}">
                    <option value="Nam">Nam</option>
                    <option value="Nữ">Nữ</option>
                </select>
            </div>

            <div class="col-md-6 mb-3">
                <label>Ngày sinh</label>
                <input type="date" class="form-control" th:field="*{ngaySinh}">
            </div>

            <div class="col-md-6 mb-3">
                <label>Mật khẩu</label>
                <input type="password" class="form-control" th:field="*{matKhau}">
            </div>

        </div>

        <div class="mt-3">

            <button class="btn btn-success"
                    th:formaction="@{/khachHang/add}">
                Thêm
            </button>

            <button class="btn btn-warning"
                    th:if="*{idKh != null}"
                    th:formaction="@{'/khachHang/update/' + *{idKh}}">
                Cập nhật
            </button>

        </div>

    </form>

    <hr>

    <!-- TABLE -->
    <table class="table table-bordered table-hover text-center">

        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Mã KH</th>
            <th>Tên khách hàng</th>
            <th>Email</th>
            <th>SĐT</th>
            <th>Trạng thái</th>
            <th>Chức năng</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="kh : ${listKhachHang}">
            <td th:text="${kh.idKh}"></td>
            <td th:text="${kh.maKh}"></td>
            <td th:text="${kh.tenKhachHang}"></td>
            <td th:text="${kh.email}"></td>
            <td th:text="${kh.soDienThoai}"></td>

            <td>
                <span th:if="${kh.trangThai}" class="text-success">Đang hoạt động</span>
                <span th:unless="${kh.trangThai}" class="text-danger">Ngừng</span>
            </td>

            <td>
                <a class="btn btn-primary btn-sm"
                   th:href="@{'/khachHang/detail/' + ${kh.idKh}}">
                    Sửa
                </a>

                <a class="btn btn-danger btn-sm"
                   th:href="@{'/khachHang/delete/' + ${kh.idKh}}">
                    Xóa
                </a>
            </td>
        </tr>
        </tbody>

    </table>

</div>

</body>
</html>
