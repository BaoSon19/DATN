<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý nhân viên</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

<div class="container mt-4">

    <h2 class="text-center mb-4">QUẢN LÝ NHÂN VIÊN</h2>

    <form th:object="${nhanVien}"
          method="post">

        <input type="hidden" th:field="*{idNv}">

        <div class="row">

            <div class="col-md-6 mb-3">
                <label>Mã nhân viên</label>
                <input type="text" class="form-control" th:field="*{maNv}">
                <small class="text-danger"
                       th:errors="*{maNv}"></small>
            </div>

            <div class="col-md-6 mb-3">
                <label>Họ tên</label>
                <input type="text" class="form-control" th:field="*{hoTen}">
                <small class="text-danger"
                       th:errors="*{hoTen}"></small>
            </div>

            <div class="col-md-6 mb-3">
                <label>Số điện thoại</label>
                <input type="text" class="form-control"
                       th:field="*{soDienThoai}">
            </div>

            <div class="col-md-6 mb-3">
                <label>Email</label>
                <input type="email" class="form-control"
                       th:field="*{email}">
            </div>

            <div class="col-md-6 mb-3">
                <label>Mật khẩu</label>
                <input type="password" class="form-control"
                       th:field="*{matKhau}">
            </div>

            <div class="col-md-6 mb-3">
                <label>CCCD</label>
                <input type="text" class="form-control"
                       th:field="*{cccd}">
            </div>

            <div class="col-md-6 mb-3">
                <label>Giới tính</label>
                <select class="form-select"
                        th:field="*{gioiTinh}">
                    <option value="Nam">Nam</option>
                    <option value="Nữ">Nữ</option>
                </select>
            </div>

            <div class="col-md-6 mb-3">
                <label>Ngày sinh</label>
                <input type="date" class="form-control"
                       th:field="*{ngaySinh}">
            </div>

            <div class="col-md-6 mb-3">
                <label>Địa chỉ</label>
                <input type="text" class="form-control"
                       th:field="*{diaChi}">
            </div>

            <div class="col-md-6 mb-3">
                <label>Vai trò</label>
                <select class="form-select"
                        th:field="*{vaiTro}">
                    <option value="ADMIN">Admin</option>
                    <option value="NHANVIEN">Nhân viên</option>
                </select>
            </div>

            <div class="col-md-6 mb-3">
                <label>Ngày vào làm</label>
                <input type="date" class="form-control"
                       th:field="*{ngayVaoLam}">
            </div>

            <div class="col-md-6 mb-3">
                <label>Trạng thái</label>
                <select class="form-select"
                        th:field="*{trangThai}">
                    <option th:value="true">Đang làm</option>
                    <option th:value="false">Nghỉ việc</option>
                </select>
            </div>

        </div>

        <button class="btn btn-success"
                th:formaction="@{/nhanVien/add}">
            Thêm
        </button>

        <button class="btn btn-warning"
                th:if="*{idNv != null}"
                th:formaction="@{'/nhanVien/update/' + *{idNv}}">
            Cập nhật
        </button>

    </form>

    <hr>

    <table class="table table-bordered mt-3">
        <thead>
        <tr>
            <th>ID</th>
            <th>Mã NV</th>
            <th>Họ tên</th>
            <th>SĐT</th>
            <th>Email</th>
            <th>Vai trò</th>
            <th>Trạng thái</th>
            <th>Chức năng</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="nv : ${listNhanVien}">
            <td th:text="${nv.idNv}"></td>
            <td th:text="${nv.maNv}"></td>
            <td th:text="${nv.hoTen}"></td>
            <td th:text="${nv.soDienThoai}"></td>
            <td th:text="${nv.email}"></td>
            <td th:text="${nv.vaiTro}"></td>

            <td>
                <span th:if="${nv.trangThai}">
                    Đang làm
                </span>

                <span th:unless="${nv.trangThai}">
                    Nghỉ việc
                </span>
            </td>

            <td>
                <a class="btn btn-info btn-sm"
                   th:href="@{'/nhanVien/detail/' + ${nv.idNv}}">
                    Chi tiết
                </a>

                <a class="btn btn-danger btn-sm"
                   th:href="@{'/nhanVien/delete/' + ${nv.idNv}}">
                    Xóa
                </a>
            </td>
        </tr>
        </tbody>
    </table>

</div>

</body>
</html>
